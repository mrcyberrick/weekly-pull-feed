name: Send Weekly Newsletter

on:
  schedule:
    # Tuesday 6:00 PM ET (22:00 UTC during EDT).
    # Comics drop Wednesday, so this lands the night before as a preview.
    # NOTE: adjust to 23:00 UTC when EST resumes in November, or leave as-is
    # and accept a 1-hour shift.
    - cron: "0 22 * * 2"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Create draft in Brevo without sending"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ------------------------------------------------------------------
      # OPTION A: your existing build step already generates email.html
      # into the repo (committed by another workflow). Nothing needed here.
      #
      # OPTION B: generate it fresh in this run. Replace the command below
      # with whatever your weekly-pull-feed generator uses.
      # ------------------------------------------------------------------
      # - name: Generate email HTML
      #   run: node scripts/build-email.js

      - name: Send campaign via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: "Ray & Judy's Book Stop"
          EMAIL_HTML_PATH: "newsletter-email.html"
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
        run: node scripts/send-brevo-campaign.js
